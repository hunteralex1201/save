# nginx use korle: ei file ta /etc/nginx/sites-available/save e rakho,
# tarpor:  ln -s /etc/nginx/sites-available/save /etc/nginx/sites-enabled/
#          nginx -t && systemctl reload nginx
#          certbot --nginx -d save.hunterflow.cloud   (free SSL er jonno)

server {
    listen 80;
    server_name save.hunterflow.cloud;

    # boro video download e limit na thake
    client_max_body_size 0;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # lomba download er jonno timeout বাড়ানো
        proxy_read_timeout    1800s;
        proxy_send_timeout    1800s;
        proxy_buffering       off;
    }
}
